<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ParkHub</title>
    <meta name="description" content="Find and book parking spots">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: hsl(var(--muted-foreground));
        }

        .booking-summary {
            background: hsl(var(--secondary));
            padding: 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid hsl(var(--border));
        }

        .summary-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.25rem;
            color: hsl(var(--primary));
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 2px solid hsl(var(--border));
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-option:hover {
            border-color: hsl(var(--primary));
        }

        .payment-option.selected {
            border-color: hsl(var(--primary));
            background: hsl(var(--primary) / 0.05);
        }

        .payment-option input {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body style="background-color: hsl(var(--primary) / 0.05);">
    <!-- Header -->
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-content">
                <a href="index.html" class="nav-logo">
                    <div class="nav-logo-icon">
                        <svg class="icon" style="stroke: white;">
                            <use href="assets/icons.svg#icon-map-pin"></use>
                        </svg>
                    </div>
                    <span class="nav-logo-text">ParkHub</span>
                </a>
                <div class="nav-links">
                    <span id="userName" style="color: white; margin-right: 1rem;"></span>
                    <a href="index.html" class="nav-link" style="display: flex; align-items: center; gap: 0.5rem;"
                        onclick="localStorage.clear()">
                        <svg class="icon">
                            <use href="assets/icons.svg#icon-log-out"></use>
                        </svg>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8" style="max-width: 80rem; margin: 0 auto; padding: 2rem 1rem;">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="search">
                <svg class="icon">
                    <use href="assets/icons.svg#icon-search"></use>
                </svg>
                Find Parking
            </button>
            <button class="tab" data-tab="bookings">
                <svg class="icon">
                    <use href="assets/icons.svg#icon-clock"></use>
                </svg>
                Active Bookings
            </button>
            <button class="tab" data-tab="history">
                <svg class="icon">
                    <use href="assets/icons.svg#icon-history"></use>
                </svg>
                Booking History
            </button>
        </div>

        <!-- Search Tab -->
        <div id="search" class="tab-content active">
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Search Form -->
                <div class="card">
                    <h2
                        style="font-size: 1.5rem; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 1.5rem;">
                        Find Parking Spots
                    </h2>

                    <div
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Location</label>
                            <input type="text" id="searchLocation" placeholder="Enter location or area name"
                                class="form-input" />
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">PIN Code</label>
                            <input type="text" id="searchPinCode" placeholder="Enter PIN code" class="form-input" />
                        </div>
                    </div>

                    <button id="searchBtn" class="btn btn-primary" style="width: 100%;">
                        <svg class="icon">
                            <use href="assets/icons.svg#icon-search"></use>
                        </svg>
                        Search Parking
                    </button>
                </div>

                <!-- Parking Lots Results -->
                <div>
                    <h3
                        style="font-size: 1.25rem; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 1rem;">
                        Available Parking Lots</h3>
                    <div id="parkingLotsContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Parking lots will be rendered here by JavaScript -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Bookings Tab -->
        <div id="bookings" class="tab-content">
            <h2 style="font-size: 1.5rem; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 1.5rem;">
                Active Bookings
            </h2>
            <div id="activeBookingsContainer">
                <div class="card" style="padding: 3rem; text-align: center;">
                    <p style="color: hsl(var(--muted-foreground));">Loading...</p>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <h2 style="font-size: 1.5rem; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 1.5rem;">
                Booking History
            </h2>
            <div id="historyContainer">
                <div class="card" style="padding: 3rem; text-align: center;">
                    <p style="color: hsl(var(--muted-foreground));">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Confirmation Modal -->
    <div id="bookingModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Confirm Booking</h2>
                <button class="modal-close" onclick="closeBookingModal()">&times;</button>
            </div>

            <div class="booking-summary">
                <h3 style="font-weight: 600; margin-bottom: 1rem;">Booking Summary</h3>
                <div class="summary-row">
                    <span>Parking Lot</span>
                    <span id="modalLotName">-</span>
                </div>
                <div class="summary-row">
                    <span>Location</span>
                    <span id="modalLotAddress">-</span>
                </div>
                <div class="summary-row">
                    <span>Hourly Rate</span>
                    <span id="modalHourlyRate">-</span>
                </div>
                <div class="summary-row">
                    <span>Available Spots</span>
                    <span id="modalAvailableSpots">-</span>
                </div>
                <div class="summary-row">
                    <span>Estimated Cost (1 hr)</span>
                    <span id="modalEstimatedCost">-</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Vehicle Number</label>
                <input type="text" id="modalVehicleNumber" class="form-input" placeholder="MH01AB1234" />
            </div>

            <h3 style="font-weight: 600; margin-bottom: 1rem;">Select Payment Method</h3>
            <div class="payment-methods">
                <label class="payment-option selected">
                    <input type="radio" name="payment" value="cash" checked>
                    <span>💵 Pay at Location (Cash)</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment" value="upi">
                    <span>📱 UPI Payment</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment" value="card">
                    <span>💳 Credit/Debit Card</span>
                </label>
            </div>

            <div id="modalAlert"></div>

            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="closeBookingModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="confirmBooking()">
                    ✓ Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
