<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkHub - Smart Parking Solution</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body
    style="background: linear-gradient(135deg, hsl(var(--primary)), hsl(217 91% 50%)); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 600px; margin: 1rem; text-align: center;">
        <h1 style="font-size: 3rem; font-weight: 700; color: hsl(var(--primary)); margin-bottom: 1rem;">🅿️ ParkHub</h1>
        <p style="font-size: 1.25rem; color: hsl(var(--muted-foreground)); margin-bottom: 2rem;">
            Find and book parking spots instantly
        </p>

        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="login.html" class="btn btn-primary"
                style="text-decoration: none; font-size: 1rem; padding: 0.75rem 2rem;">
                User Login
            </a>
            <a href="register.html" class="btn btn-secondary"
                style="text-decoration: none; font-size: 1rem; padding: 0.75rem 2rem;">
                Sign Up
            </a>
            <a href="admin-login.html" class="btn btn-secondary"
                style="text-decoration: none; font-size: 1rem; padding: 0.75rem 2rem;">
                Admin Login
            </a>
        </div>

        <div
            style="margin-top: 3rem; padding: 1.5rem; background: hsl(var(--secondary)); border-radius: var(--radius);">
            <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem;">✨ Features</h3>
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; text-align: left;">
                <div>
                    <div style="font-weight: 600; margin-bottom: 0.25rem;">🔍 Real-time Search</div>
                    <div style="font-size: 0.875rem; color: hsl(var(--muted-foreground));">Find available spots</div>
                </div>
                <div>
                    <div style="font-weight: 600; margin-bottom: 0.25rem;">⚡ Instant Booking</div>
                    <div style="font-size: 0.875rem; color: hsl(var(--muted-foreground));">Book in seconds</div>
                </div>
                <div>
                    <div style="font-weight: 600; margin-bottom: 0.25rem;">💳 Easy Payment</div>
                    <div style="font-size: 0.875rem; color: hsl(var(--muted-foreground));">Pay as you park</div>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; padding: 1rem; background: hsl(var(--muted)); border-radius: var(--radius);">
            <p style="font-size: 0.75rem; color: hsl(var(--muted-foreground)); margin-bottom: 0.5rem;"><strong>🔑 Demo
                    Credentials:</strong></p>
            <p style="font-size: 0.75rem; color: hsl(var(--muted-foreground));">User: user1@parkhub.com / password123
            </p>
            <p style="font-size: 0.75rem; color: hsl(var(--muted-foreground));">Admin: admin@parkhub.com / admin123456
            </p>
        </div>
    </div>
</body>

</html>
