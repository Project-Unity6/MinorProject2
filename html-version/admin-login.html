<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ParkHub</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }

            50% {
                transform: scale(1.1) rotate(180deg);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.925rem;
            margin-top: 0.5rem;
        }

        .form-input-styled {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-input-styled:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .btn-admin {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .demo-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            border-radius: 12px;
            text-align: center;
        }

        .demo-box p {
            font-size: 0.8rem;
            color: #555;
            margin: 0.25rem 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">🔐</div>
            <h1 class="login-title">Admin Portal</h1>
            <p class="login-subtitle">ParkHub Management System</p>
        </div>

        <div id="alert"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label class="form-label" style="font-weight: 600; color: #333;">Email Address</label>
                <input type="email" id="email" class="form-input-styled" placeholder="admin@parkhub.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" style="font-weight: 600; color: #333;">Password</label>
                <input type="password" id="password" class="form-input-styled" placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn-admin">
                Sign In to Dashboard →
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="login.html" class="back-link">
                ← Back to User Login
            </a>
        </div>

        <div class="demo-box">
            <p><strong>🔑 Demo Credentials</strong></p>
            <p>admin@parkhub.com</p>
            <p>admin123456</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                if (data.user.role !== 'ADMIN') {
                    throw new Error('Access denied. Admin credentials required.');
                }

                localStorage.setItem('authToken', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        });
    </script>
</body>

</html>
