<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ParkHub</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #43e97b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00c9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.925rem;
            margin-top: 0.5rem;
        }

        .form-input-styled {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-input-styled:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
            background: white;
        }

        .btn-user {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .btn-user:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .links-section {
            text-align: center;
            margin-top: 1.5rem;
        }

        .links-section a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links-section a:hover {
            color: #00c9ff;
        }

        .demo-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
            border-radius: 12px;
        }

        .demo-box p {
            font-size: 0.8rem;
            color: #00796b;
            margin: 0.25rem 0;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">🅿️</div>
            <h1 class="login-title">ParkHub</h1>
            <p class="login-subtitle">Sign in to your account</p>
        </div>

        <div id="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" style="font-weight: 600; color: #333;">Email Address</label>
                <input type="email" id="email" class="form-input-styled" placeholder="user1@parkhub.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" style="font-weight: 600; color: #333;">Password</label>
                <input type="password" id="password" class="form-input-styled" placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn-user">
                Sign In →
            </button>
        </form>

        <div class="links-section">
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">
                Don't have an account? <a href="register.html">Sign up</a>
            </p>
            <p style="color: #666; font-size: 0.9rem;">
                <a href="admin-login.html">Admin Login</a>
            </p>
        </div>

        <div class="demo-box">
            <p><strong>🔑 Demo Accounts</strong></p>
            <p>User: user1@parkhub.com / password123</p>
            <p>Admin: admin@parkhub.com / admin123456</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('authToken', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                if (data.user.role === 'ADMIN') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        });
    </script>
</body>

</html>
